<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peach Blossom Spring · Marks</title>
    <link rel="stylesheet" href="marks.css">
    <script src="marks.js" defer></script>
</head>
<body>

<div id="choice-screen">
    <div id="choice-quote">"When he left, he marked every turn — carved into bark, stones stacked at forks. The magistrate sent men to follow. They found the marks. They did not find the way."<br><br><span class="signature">— Liu Ziji's diary</span></div>
    <div id="choice-buttons">
        <div class="choice-btn" id="btn-fisherman">the fisherman</div>
        <div class="choice-btn" id="btn-bird">the bird</div>
    </div>
    <div id="choice-sub">two ways of returning</div>
</div>

<div id="map-container">
    <div id="fog-overlay"></div>
    <div id="map-layer"></div>
    <div id="marks-layer"></div>
    <div id="trail-layer"></div>
    <div id="entity"></div>
    <div id="narration"></div>
    <div id="destination"></div>
    <div id="step-counter"></div>
    <div id="map-hint"></div>
</div>

<div id="end-screen">
    <div id="end-text"></div>
    <div id="end-again">try the other way</div>
</div>

<div id="nest-link"></div>
<div id="flying-bird">
    <div class="fly-head"></div>
    <div class="fly-body"></div>
    <div class="fly-wing left"></div>
    <div class="fly-wing right"></div>
    <div class="fly-tail"></div>
</div>

</body>
</html>
