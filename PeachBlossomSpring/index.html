<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peach Blossom Spring</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Background rock texture characters -->
    <span class="bg-char" style="top: 8%; left: 12%;">山</span>
    <span class="bg-char" style="top: 15%; left: 78%;">石</span>
    <span class="bg-char" style="top: 30%; left: 5%;">岩</span>
    <span class="bg-char" style="top: 45%; left: 88%;">崖</span>
    <span class="bg-char" style="top: 60%; left: 15%;">壁</span>
    <span class="bg-char" style="top: 72%; left: 82%;">峭</span>
    <span class="bg-char" style="top: 85%; left: 25%;">嶂</span>
    <span class="bg-char" style="top: 22%; left: 92%;">峰</span>
    <span class="bg-char" style="top: 50%; left: 3%;">隙</span>
    <span class="bg-char" style="top: 38%; left: 70%;">磐</span>

    <!-- Floating particles -->
    <div class="particle" style="left: 20%; top: 80%;"></div>
    <div class="particle" style="left: 55%; top: 70%;"></div>
    <div class="particle" style="left: 80%; top: 85%;"></div>
    <div class="particle" style="left: 35%; top: 75%;"></div>
    <div class="particle" style="left: 65%; top: 90%;"></div>
    <div class="particle" style="left: 10%; top: 65%;"></div>

    <!-- Letter content -->
    <div class="letter-container">
        <p id="opening" class="paragraph"></p>
        <p id="para1" class="paragraph hidden"></p>
        <p id="para2" class="paragraph hidden"></p>
        <p id="para3" class="paragraph hidden"></p>
        <p id="para4" class="paragraph hidden"></p>
        <p id="para5" class="paragraph hidden"></p>

        <div id="signature" class="signature">
            Liu Ziji<br>
            Autumn, 393 AD
        </div>
    </div>
</body>
</html>
